services:
  - type: web
    name: tours-taxi-backend
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: API_PREFIX
        value: api
      - key: API_VERSION
        value: v1
      - key: DATABASE_URL
        fromDatabase:
          name: tours-taxi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d

databases:
  - name: tours-taxi-db
    plan: free
    databaseName: tours_taxi_db
    user: tours_taxi_user
